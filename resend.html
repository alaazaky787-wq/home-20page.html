<!DOCTYPE html>
<html  lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>resend pass</title>
</head>
<body class="flex items-center justify-center min-h-screen  bg-[url('background.jpg')] bg-cover">

  <div class="w-[350px] p-6 rounded-xl bg-white/30 backdrop-blur-md shadow-2xl">
    <h2 class="text-2xl font-bold text-center mb-4">تأكيد الرمز</h2>
    <p class="text-center mb-4">أدخل الرمز المكون من 6 أرقام الذي أرسلناه لك</p>

    <form action="new pass.html" method="get" class="space-y-4">
      <input type="text" maxlength="6" placeholder="••••••" 
             class="w-full p-3 border rounded-lg text-center tracking-widest focus:outline-none" required >

      <button type="submit" 
              class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 transition">
        تأكيد الرمز
      </button>
    </form>
  </div>


</body>
</html>
