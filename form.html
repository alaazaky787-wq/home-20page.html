<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-100 font-sans">

<div class="flex min-h-screen">

  <!-- ✅ Sidebar -->
  <div class="w-80 bg-white shadow p-6 flex flex-col gap-3">

    <h2 class="text-xl font-bold text-green-700 mb-6">مشكاة</h2>

    <ul class="space-y-6 text-gray-600 flex-1 ">

      <li class="flex items-center gap-2 text-green-700 text-lg font-bold cursor-pointer">
        <i class="fa-solid fa-house"></i>
        الفورم
      </li>

      <li class="flex items-center gap-2 hover:text-green-700 text-lg font-medium cursor-pointer"><a href="reports.html">
        <i class="fa-solid fa-file-lines"></i>
        تقارير الابناء
      </a></li>

      <li class="flex items-center gap-2 hover:text-green-700  text-lg font-medium cursor-pointer"><a href="episodes.html">
        <i class="fa-solid fas fa-book-open"></i>
        جدول الحلقات
     </a> </li>

      <li class="flex items-center gap-2 hover:text-green-700 text-lg font-medium cursor-pointer"><a href="notification.html">
        <i class="fas fa-bell"></i>
         الاشعارات

      </a></li>

      <li class="flex items-center gap-2 hover:text-green-700 text-lg font-medium cursor-pointer"><a href="payment.html">
        <i class="fa-solid far far fa-credit-card"></i>
        الاشتراك والدفع
      </a></li>
    </ul>

    <!-- تسجيل خروج -->
    <div class="  text-gray-500 font-medium text-lg mt-auto flex items-center gap-2 cursor-pointer hover:text-red-500">
      <i class="fa-solid fa-right-from-bracket"></i>
      تسجيل خروج
    </div>

  </div>
   


<div class="p-6 w-full">

  <!-- العنوان -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">تحديث ملفك الشخصي</h1>
    <p class="text-gray-500 text-sm mt-1">
      يرجى التأكد من دقة البيانات المدخلة لضمان استلام التحديثات الخاصة بأبنائك.
    </p>
  </div>

  <!-- الفورم -->
  <form class="bg-white rounded-2xl shadow p-6 w-full">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- الاسم -->
      <div>
        <label class="text-sm text-gray-600 flex items-center gap-2 mb-2">
          <i class="fas fa-user text-gray-500"></i>
          الاسم الكامل
        </label>
        <input type="text" placeholder="أدخل اسمك الثلاثي"
          class="w-full bg-gray-100 p-3 rounded-lg outline-none">
      </div>

      <!-- الايميل -->
      <div>
        <label class="text-sm text-gray-600 flex items-center gap-2 mb-2">
          <i class="fas fa-envelope text-gray-500"></i>
          البريد الإلكتروني
        </label>
        <input type="email" placeholder="example@mail.com"
          class="w-full bg-gray-100 p-3 rounded-lg outline-none">
      </div>

      <!-- الرقم القومي -->
      <div class="md:col-span-2">
        <label class="text-sm text-gray-600 flex items-center gap-2 mb-2">
          <i class="fas fa-id-card text-gray-500"></i>
          الرقم القومي / الهوية (اختياري)
        </label>
        <input type="text" placeholder="10xxxxxxxx"
          class="w-full bg-gray-100 p-3 rounded-lg outline-none">
      </div>

      <!-- عدد الأبناء -->
      <div>
        <label class="text-sm text-gray-600 mb-2 block">
                      <i class="fas fas fa-user-friends text-gray-500"></i>

          عدد الأبناء
        </label>
        <input type="number" value="1"
          class="w-full bg-gray-100 p-3 rounded-lg outline-none">
      </div>

      <!-- صلة القرابة -->
      <div>
        <label class="text-sm text-gray-600 mb-2 block">
                      <i class="fas fas fa-user-friends text-gray-500"></i>

          صلة القرابة (اختياري)
        </label>
        <input type="text" value="أب"
          class="w-full bg-gray-100 p-3 rounded-lg outline-none">
      </div>

      <!-- ربط الأبناء -->
      <div class="md:col-span-2">
        <label class="text-sm text-gray-600 mb-2 block">
                      <i class="fas fas fa-link text-gray-500"></i>

          ربط الأبناء (إضافة كود الطالب)
        </label>

        <div class="flex gap-3 mb-3">
          <button class="bg-green-400 text-white px-4 py-2 rounded-lg flex items-center gap-2">
            <i class="fas fa-plus"></i>
            إضافة كود
          </button>

          <input type="text" placeholder="STD-00000"
            class="flex-1 bg-gray-100 p-3 rounded-lg outline-none">
        </div>

        <!-- الأكواد -->
        <div class="flex gap-2 flex-wrap">
          <span class="bg-gray-200 px-3 py-1 rounded-full text-sm flex items-center gap-2">
            STD-11029
            <i class="fas fa-times text-gray-500 cursor-pointer"></i>
          </span>

          <span class="bg-gray-200 px-3 py-1 rounded-full text-sm flex items-center gap-2">
            STD-45920
            <i class="fas fa-times text-gray-500 cursor-pointer"></i>
          </span>
        </div>
      </div>

      <!-- النوع -->
      <div class="md:col-span-2 mt-4">
        <label class="text-sm text-gray-600 mb-2 block">
          النوع
        </label>

        <div class="flex items-center gap-6">
          <label class="flex items-center gap-2">
            <input type="radio" name="gender" class="accent-green-600">
            ذكر
          </label>

          <label class="flex items-center gap-2">
            <input type="radio" name="gender">
            أنثى
          </label>
        </div>
      </div>

    </div>
    </form>

    <!-- الأزرار -->
    <div class="flex items-center gap-4 mt-8">
      <button class="bg-green-700 text-white px-6 py-3 rounded-lg shadow hover:bg-green-800 transition">
حفظ البيانات
      </button>

      <button class="text-gray-500">
        إلغاء
      </button>
    </div>

  </div>

 

</div>

</body>
</html>
